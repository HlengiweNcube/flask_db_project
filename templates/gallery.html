{% extends "base.html" %}

{% block content %}

<h1>African Fashion Gallery</h1>

<form method="GET">
    <input type="text" name="category" placeholder="Filter by category">
    <button type="submit">Filter</button>
</form>

<a href="/gallery?sort=asc">Sort A-Z</a>
<a href="/gallery?sort=desc">Sort Z-A</a>

<div class="tabs">
    <button type="button" onclick="showCategory('all')">All</button>
    <button type="button" onclick="showCategory('Women')">Women</button>
    <button type="button" onclick="showCategory('Men')">Men</button>
    <button type="button" onclick="showCategory('Teens')">Teens</button>
    <button type="button" onclick="showCategory('Children')">Children</button>
</div>

<div id="gallery" class="gallery-container">
    {% for outfit in outfits %}
        <div class="card" data-category="{{ outfit.category }}">
            <img src="{{ outfit.image_url }}" alt="{{ outfit.name }}">
            <h3>{{ outfit.name }}</h3>
            <p>{{ outfit.category }}</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
