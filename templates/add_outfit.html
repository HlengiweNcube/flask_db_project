{% extends "base.html" %}

{% block content %}

<h1>Add Outfit</h1>

 <form onsubmit="submitFormJSON(event)" novalidate>

    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Category:</label><br>
    <input type="text" name="category"><br><br>

    <label>Description:</label><br>
    <textarea name="description"></textarea><br><br>

    <label>Image URL:</label><br>
    <input type="text" name="image_url"><br><br>

    <!-- ✅ QUANTITY FIELD -->
    <label>Quantity:</label><br>
    <input type="number" name="quantity" min="0" required><br><br>

    <!-- ✅ PRICE FIELD -->
    <label>Price (€):</label><br>
    <input type="number" step="0.01" name="price" min="0" required><br><br>

    <!-- ✅ BUTTON -->
    <button type="submit" class="btn-black">Add Outfit</button>

</form>

{% endblock %}
