{% extends "base.html" %}

{% block content %}
<h1>Edit Outfit</h1>

<form method="POST">
    <input type="text" name="name" value="{{ outfit.name }}" required><br><br>
    <input type="text" name="category" value="{{ outfit.category }}"><br><br>
    <textarea name="description">{{ outfit.description }}</textarea><br><br>
    <input type="text" name="image_url" value="{{ outfit.image_url }}"><br><br>

    <button type="submit">Update</button>
</form>

{% endblock %}
